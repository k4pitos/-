<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Пізнавальні тести</title>
    <style>
        :root {
            --light-bg: #ffffff;
            --light-text: #000000;
            --dark-bg: #121212;
            --dark-text: #f0f0f0;
            --accent: #4CAF50;
        }

        body.light {
            background-color: var(--light-bg);
            color: var(--light-text);
            --bg-color: var(--light-bg);
            --text-color: var(--light-text);
        }

        body.dark {
            background-color: var(--dark-bg);
            color: var(--dark-text);
            --bg-color: var(--dark-bg);
            --text-color: var(--dark-text);
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: rgba(0,0,0,0.05);
            padding: 2rem;
            border-radius: 12px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 800px;
        }

        h1, h2 {
            text-align: center;
            color: var(--accent);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            align-items: center;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--accent);
        }

        button, input, textarea, select {
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: var(--accent);
            color: white;
            cursor: pointer;
            border: none;
        }

        button:hover {
            opacity: 0.8;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        .quiz-card, .result-card {
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .question {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid var(--accent);
            border-radius: 8px;
            background: transparent;
        }

        .score {
            font-size: 2rem;
            text-align: center;
            font-weight: bold;
            color: var(--accent);
        }

        nav {
            text-align: center;
            margin-bottom: 1rem;
        }

        nav a {
            margin: 0 10px;
            font-weight: bold;
        }

        .question-group {
            border: 1px solid var(--accent);
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 8px;
            background: rgba(76, 175, 80, 0.05);
        }

        .quiz-select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--accent);
            transition: all 0.3s ease;
        }

        .quiz-select:hover {
            border-color: var(--accent);
            box-shadow: 0 0 5px var(--accent);
        }

        .remove-btn {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
            margin-top: 10px;
        }

        .btn-edit {
            background-color: #2196F3;
            padding: 5px 15px;
            border-radius: 5px;
            color: white;
        }

        .btn-delete {
            background-color: #f44336;
            padding: 5px 15px;
            border-radius: 5px;
            color: white;
        }

        .btn-start {
            background-color: var(--accent);
            padding: 5px 15px;
            border-radius: 5px;
            color: white;
        }

        .flex-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <span>📚 Knowledge Quiz</span>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>
        {% if session.user_id %}
        <nav>
            <a href="{{ url_for('home') }}">🏠 Головна</a>
            <a href="{{ url_for('add_quiz') }}">➕ Створити тест</a>
            <a href="{{ url_for('my_results') }}">📊 Мої результати</a>
            <a href="{{ url_for('logout') }}">🚪 Вихід</a>
        </nav>
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <script>
        const theme = localStorage.getItem('theme') || 'light';
        document.body.classList.add(theme);

        function toggleTheme() {
            const current = document.body.classList.contains('dark') ? 'dark' : 'light';
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.body.classList.remove(current);
            document.body.classList.add(newTheme);
            localStorage.setItem('theme', newTheme);
        }
    </script>
</body>
</html>
