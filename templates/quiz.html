{% extends "base.html" %}
{% block content %}
<h2>📝 {{ quiz.title }}</h2>
<p>{{ quiz.description }}</p>

<form method="POST">
    {% for q in quiz.questions %}
        <div class="question">
            <p><strong>{{ loop.index }}. {{ q.text }}</strong></p>
            {% if q.image and q.image != 'None' and q.image != '' %}
                <div class="question-image-container">
                    <img src="{{ q.image }}" alt="Зображення до питання" class="question-image">
                </div>
            {% endif %}
            <select name="q{{ loop.index0 }}" required class="quiz-select">
                <option value="" disabled selected>-- Оберіть відповідь --</option>
                {% for opt in q.options %}
                    <option value="{{ opt }}">{{ opt }}</option>
                {% endfor %}
            </select>
        </div>
    {% endfor %}
    
    <button type="submit">✅ Завершити тест</button>
</form>

<style>
    .question {
        margin-bottom: 25px;
        padding: 15px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        background: transparent;
    }
    
    .question-image-container {
        text-align: center;
        margin: 15px 0;
    }
    
    .question-image {
        max-width: 100%;
        max-height: 300px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        display: inline-block;
    }
    
    .quiz-select {
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        margin-top: 10px;
        cursor: pointer;
        background-color: var(--bg-color);
        color: var(--text-color);
        border: 1px solid var(--accent);
        transition: all 0.3s ease;
    }
    
    .quiz-select:hover {
        border-color: var(--accent);
        box-shadow: 0 0 5px var(--accent);
    }
    
    button {
        padding: 12px 20px;
        background-color: var(--accent);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        width: 100%;
        transition: all 0.3s ease;
    }
    
    button:hover {
        opacity: 0.8;
        transform: scale(1.02);
    }
</style>
{% endblock %}
