{% extends "base.html" %}
{% block content %}
<h2>📚 Виберіть категорію тестів</h2>

<div class="categories-container">
    <a href="/category/cars" class="category-card">
        <div class="category-icon">🚘</div>
        <div class="category-name">Марки автомобілів</div>
        <div class="category-count">📊 {{ categories.cars.quizzes|length }} тестів</div>
    </a>
    
    <a href="/category/countries" class="category-card">
        <div class="category-icon">🌍</div>
        <div class="category-name">Місцевість (Країни)</div>
        <div class="category-count">📊 {{ categories.countries.quizzes|length }} тестів</div>
    </a>
    
    <a href="/category/rebus" class="category-card">
        <div class="category-icon">🧩</div>
        <div class="category-name">Ребуси</div>
        <div class="category-count">📊 {{ categories.rebus.quizzes|length }} тестів</div>
    </a>
</div>

<style>
    .categories-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 30px;
    }
    
    .category-card {
        background: linear-gradient(135deg, var(--accent) 0%, #45a049 100%);
        color: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        text-decoration: none;
        display: block;
    }
    
    .category-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }
    
    .category-icon {
        font-size: 60px;
        margin-bottom: 15px;
    }
    
    .category-name {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 10px;
    }
    
    .category-count {
        font-size: 14px;
        opacity: 0.9;
    }
    
    body.dark .category-card {
        background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
    }
</style>
{% endblock %}
